<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quas, saepe adipisci. Unde mollitia quo maiores sapiente exercitationem, nesciunt dicta! Vitae veritatis nulla culpa hic saepe quis eligendi eius laudantium! Hic.</p>
    <button onclick="startColor()"> Start Timer </button>
    <button onclick="stopColor()"> Stop Timer </button>
    <script>
        function startColor()
        {
            intervalValue = setInterval(showColor, 500);
        }
        function stopColor()
        {
            clearInterval(intervalValue);
        }
        function showColor()
        {
            let bdy = document.body;
            bdy.style.backgroundColor = bdy.style.backgroundColor=="yellow"? "pink": "yellow";
        }
    </script>
</body>
</html>
