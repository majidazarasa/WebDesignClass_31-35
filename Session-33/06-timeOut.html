<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body onload="myFunc()">
    <button onclick="stopTimeOut()">Stop</button>
    <script>
        let myVar;
debugger
        function myFunc()
        {
            myVar = setTimeout(myAlert, 5000);
        }
        function myAlert()
        {
            alert('hi');
        }
        function stopTimeOut()
        {
            clearTimeout(myVar);
        }
    </script>
</body>
</html>
