<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <script>
        var x = 10;
        {
            var x = 20;
        }
        console.log('Out Scope x = ' + x);
        
        let y = 10;
        {
            let y = 20;
            console.log('In Scope y = ' + y);
        }
        console.log('Out Scope y = ' + y);
    </script>
</body>
</html>
