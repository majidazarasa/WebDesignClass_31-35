<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <ul>
        <li id="item1">item 1</li>
        <li id="item2">item 2</li>
        <li id="item3">item 3</li>
    </ul>
    <button onclick="nextItem()">Try it</button>
    <script>
        let nItem = document.getElementById("item2");
        
        function nextItem()
        {
            nItem = nItem.nextElementSibling;
            nItem.innerHTML += " (selected)";
            nItem.style.backgroundColor = "#f2f2f2";
        }
    </script>
</body>
</html>
